<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grow a Garden</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#8be6ff 0 45%, #8bdc65 45%);
}

h1 {
  text-align: center;
  color: white;
  margin-top: 20px;
}

.stats, .controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 15px;
  flex-wrap: wrap;
}

.pill {
  background: white;
  padding: 10px 15px;
  border-radius: 999px;
  font-weight: bold;
}

.garden {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  width: 90%;
  max-width: 600px;
  margin: auto;
}

.plot {
  background: #7b431f;
  border-radius: 20px;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  cursor: pointer;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.shop { background: orange; }
.money { background: purple; color: white; }
.reset { background: red; color: white; }

.message {
  text-align: center;
  margin: 15px;
  background: white;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Grow a Garden 🌱</h1>

<div class="stats">
  <div class="pill">Coins: <span id="coins"></span></div>
  <div class="pill">Seeds: <span id="seeds"></span></div>
</div>

<div class="garden" id="garden"></div>

<div class="controls">
  <button class="shop" onclick="buySeeds()">Mua seeds</button>
  <button onclick="waterAll()">Tưới</button>
  <button class="money" onclick="buyCoinsReal()">Mua 1000 coins 💰</button>
  <button class="reset" onclick="resetGame()">Reset</button>
</div>

<div class="message" id="message">
👉 Thanh toán xong nhớ inbox admin để nhận coins
</div>

<script>
const PAYPAL_LINK = "https://paypal.me/HAThi247/1";

let coins = Number(localStorage.getItem("coins")) || 20;
let seeds = Number(localStorage.getItem("seeds")) || 5;
let plots = JSON.parse(localStorage.getItem("plots")) || Array(9).fill(0);

const garden = document.getElementById("garden");

function save() {
  localStorage.setItem("coins", coins);
  localStorage.setItem("seeds", seeds);
  localStorage.setItem("plots", JSON.stringify(plots));
}

function render() {
  document.getElementById("coins").textContent = coins;
  document.getElementById("seeds").textContent = seeds;

  garden.innerHTML = "";
  plots.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "plot";
    div.innerText = ["", "🌱", "🌿", "🌻", "🍅"][p];
    div.onclick = () => clickPlot(i);
    garden.appendChild(div);
  });

  save();
}

function clickPlot(i) {
  if (plots[i] === 0) {
    if (seeds <= 0) return say("Hết seeds!");
    seeds--;
    plots[i] = 1;
  } else if (plots[i] < 4) {
    plots[i]++;
  } else {
    coins += 10;
    plots[i] = 0;
    say("+10 coins 🍅");
  }
  render();
}

function buySeeds() {
  if (coins < 10) return say("Không đủ tiền");
  coins -= 10;
  seeds += 3;
  render();
}

function waterAll() {
  plots = plots.map(p => (p > 0 && p < 4 ? p + 1 : p));
  render();
}

function buyCoinsReal() {
  window.open(PAYPAL_LINK, "_blank");
}

function resetGame() {
  localStorage.clear();
  coins = 20;
  seeds = 5;
  plots = Array(9).fill(0);
  render();
}

function say(t) {
  document.getElementById("message").textContent = t;
}

render();
</script>

</body>
</html>
